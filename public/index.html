          (claude, codex, or gemini). Briefs still draft; you can run them in any AI assistant.
        </div>
      ) : null}
      {!watchOn && tasks.length > 0 ? (
        <div className="watch-hint">
          The watcher is off — schedules are armed but nothing runs until you start it:{' '}
          <code>latent watch</code>
        </div>
      ) : null}
      {tasks.length === 0 ? (
        <div className="state-card">
          <h2 className="state-title">No standing tasks.</h2>
          <p className="state-body">Arm one from a receipt — Latent will draft it on schedule and wait for your approval.</p>
        </div>
      ) : tasks.map(t => (
        <div className="task-row" key={t.id}>
          {t.autonomy === 'auto' ? <span className="chip-cold">AUTO</span> : <span className="chip-ash">DRAFTS</span>}
          <div>
            <div className="task-title">{t.title}</div>
            <div className="task-meta">
              {scheduleLabel(t.schedule)}{t.paused ? ' · paused' : t.nextRunAt ? ' · next ' + relTime(t.nextRunAt) : ''}
              {t.approvals ? ' · ' + t.approvals + ' approved' : ''}
            </div>
          </div>
          <span className="task-spacer"></span>
          <button className="btn-text quiet" onClick={() => onAct(t, 'run-now')}>Run now</button>
          <button className="btn-text quiet" onClick={() => onAct(t, t.paused ? 'resume' : 'pause')}>{t.paused ? 'Resume' : 'Pause'}</button>
          {t.autonomy === 'auto'
            ? <button className="btn-text quiet" onClick={() => onAct(t, 'autonomy-draft')}>Back to drafts</button>
            : null}
          <button className="btn-text quiet" onClick={() => onAct(t, 'delete')}>Delete</button>
        </div>
      ))}
    </main>
  );
}

/* Which agent is this command for? Static label when one is installed, a small
   switcher when several are, an honest 'none' otherwise. Answers 'how do I know
   which agent I have' and 'what if I have multiple' in one control. */
function shq(x) { return "'" + String(x).replace(/'/g, "'\\''") + "'"; }
function liveRunLine(briefModal, env) {
  if (!briefModal || !briefModal.dir) return briefModal ? briefModal.runLine : '';
  const dir = briefModal.dir;
  const pref = (env && env.preferred) || 'claude';
  const bins = (env && env.bins) || {};
  // Absolute path to the binary when we resolved it — this is what makes the
  // command work in a terminal whose PATH lacks ~/.local/bin, Homebrew, etc.
  const bin = bins[pref] || pref;
  const verb = pref === 'codex' ? ' exec ' : ' -p ';
  return 'cd ' + shq(dir) + ' && ' + shq(bin) + verb + '"$(cat BRIEF.md)"';
}

function AgentPicker({ env, onChoose }) {
  const runners = (env && env.runners) || [];
  const RUNNER_NAMES = { claude: 'Claude Code', codex: 'Codex', gemini: 'Gemini' };
  if (!runners.length) {
    return <span className="agent-tag agent-none">No agent detected</span>;
  }
  if (runners.length === 1) {
    return <span className="agent-tag">Agent: {RUNNER_NAMES[runners[0]] || runners[0]}</span>;
  }
  return (
    <span className="agent-pick">
      <span className="agent-tag-label">Agent:</span>
      {runners.map(id => (
        <button
          key={id}
          className={'agent-opt' + (env.preferred === id ? ' on' : '')}
          aria-pressed={env.preferred === id}
          onClick={() => onChoose(id)}
        >{RUNNER_NAMES[id] || id}</button>
      ))}
    </span>
  );
}

function App() {
  // state machine: idle → scanning → reveal → report (+ error)
  const [phase, setPhase] = useState('idle');
  const [scan, setScan] = useState(null);
  const [hasLast, setHasLast] = useState(false);
  const [errMsg, setErrMsg] = useState('');
  const [progress, setProgress] = useState({ filesSeen: 0, dirsSeen: 0, currentPath: '', phase: 'walking', running: false });
  const [autoMap, setAutoMap] = useState({});          // findingId → {status, briefPath, brief, error}
  const [briefModal, setBriefModal] = useState(null);  // {title, brief, runLine}
  const [shareOpen, setShareOpen] = useState(false);
  const [freshReport, setFreshReport] = useState(false); // stagger cards only after a reveal
  const [demoMode, setDemoMode] = useState(false);       // static host: sample data, no scanning
  const [demoModal, setDemoModal] = useState(false);     // the run-it-locally explainer
  const demoRevealSeen = useRef(false);
  // overnight
  const [view, setView] = useState('report');            // report | inbox | tasks
  const [tasks, setTasks] = useState([]);
  const [inbox, setInbox] = useState([]);
  const [ledger, setLedger] = useState({ totalHours: 0, events: [] });
  const [watchOn, setWatchOn] = useState(false);
  const [armMap, setArmMap] = useState({});               // findingId -> {taskId|pending|error}
  const [autoOffer, setAutoOffer] = useState(null);       // {taskId, title, approvals}
  const [agentEnv, setAgentEnv] = useState(null);          // {runners:[], preferred:string|null}
  const [consentOpen, setConsentOpen] = useState(false); // the gate: every scan starts here
  const [scanRoots, setScanRoots] = useState([]);        // display strings for the scanning sub-line
  const [scanShell, setScanShell] = useState(false);     // shell history included in the running scan
  const scanStartedAt = useRef(0);
  const lastScanRef = useRef(null);                      // {roots, shellHistory} of the last started scan (for Retry)
  const canvasRef = useRef(null);

  const findings = useMemo(() => {
    if (!scan || !scan.findings) return [];
    return scan.findings
      .slice()
      .sort((a, b) => ((b.metrics && b.metrics.estHoursPerWeek) || 0) - ((a.metrics && a.metrics.estHoursPerWeek) || 0))
      .slice(0, MAX_RECEIPTS);
  }, [scan]);
  const maxEst = useMemo(
    () => findings.reduce((m, f) => Math.max(m, (f.metrics && f.metrics.estHoursPerWeek) || 0), 0),
    [findings]
  );

  // Seed automation state from a loaded scan (persisted briefed/automated/dismissed).
  const seedAutoMap = useCallback(s => {
    const map = {};
    (s.findings || []).forEach(f => {
      const a = f.automation || {};
      const st = ['briefed', 'automated', 'dismissed'].indexOf(a.status) !== -1 ? a.status : 'idle';
      map[f.id] = { status: st, briefPath: a.briefPath || null, brief: null };
    });
    setAutoMap(map);
  }, []);

  // Mount: resume an in-flight scan, else quietly load the cached one for idle.
  // If there is no local server at all (static demo host) or ?demo=1, fall back
  // to sample data — the site stays a working showroom instead of erroring.
  useEffect(() => {
    let dead = false;
    (async () => {
      const wantDemo = /[?&]demo=1(&|$)/.test(window.location.search);
      if (!wantDemo) {
        try {
          const pr = await fetchJSON('/api/progress');
          if (dead) return;
          if (pr.ok && pr.body && pr.body.running) {
            const c = loadConsent(); // resumed mid-scan: best-known scope for the sub-line
            if (c) { setScanRoots(c.roots.map(homeToTilde)); setScanShell(c.shellHistory === true); }
            setPhase('scanning');
            return;
          }
          if (pr.ok) {
            // A live local server — real mode, even before any scan exists.
            const r = await fetchJSON('/api/scan');
            if (!dead && r.ok && r.body) { setScan(r.body); seedAutoMap(r.body); setHasLast(true); }
            return;
          }
        } catch (e) { /* network-level failure: no server — try the demo below */ }
      }
      try {
        // no-store: sample data must never go stale across redeploys
        const d = await fetchJSON('/demo-scan.json', { cache: 'no-store' });
        if (!dead && d.ok && d.body && Array.isArray(d.body.findings)) {
          setDemoMode(true);
          setScan(d.body); seedAutoMap(d.body); setHasLast(true);
        }
      } catch (e) { /* nothing to demo — plain idle */ }
    })();
    return () => { dead = true; };
  }, [seedAutoMap]);

  const finishScan = useCallback(s => {
    setScan(s); seedAutoMap(s); setHasLast(true);
    // Reduced motion or an empty read: no choreography, straight to the report.
    if (REDUCED_MOTION || !s.findings || s.findings.length === 0) {
      setFreshReport(false); setPhase('report');
    } else {
      setPhase('reveal');
    }
  }, [seedAutoMap]);

  /* Start a read of the given roots (+ opt-in shell history). Only ever reached
     through the consent panel or a rescan/retry that reuses an already-consented scope. */
  const startScan = useCallback(async (roots, shellHistory) => {
    const scope = Array.isArray(roots) && roots.length ? roots : null;
    const shell = shellHistory === true;
    setErrMsg('');
    // A rescan invalidates any open dialog — never re-open a stale one over a fresh report.
    setBriefModal(null);
    setShareOpen(false);
    setConsentOpen(false);
    lastScanRef.current = { roots: scope, shellHistory: shell };
    setScanRoots((scope || []).map(homeToTilde));
    setScanShell(shell);
    const payload = {};
    if (scope) payload.roots = scope;
    if (shell) payload.shellHistory = true;
    try {
      const r = await fetchJSON('/api/scan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (r.status === 202 || r.status === 409) {
        scanStartedAt.current = Date.now();
        setProgress({ filesSeen: 0, dirsSeen: 0, currentPath: '', phase: 'walking', running: true });
        setPhase('scanning');
      } else {
        throw new Error((r.body && r.body.error) || ('the server answered ' + r.status));
      }
    } catch (e) {
      setErrMsg('The scan could not start — ' + (e.message || 'the local server did not respond') +
        '. Check that `node server.js` is running on port 8820, then retry.');
      setPhase('error');
    }
  }, []);

  /* Consent panel confirmed: persist the scope (+ shell opt-in), then read. */
  const consentStart = useCallback((paths, shellHistory) => {
    saveConsent(paths, shellHistory);
    startScan(paths, shellHistory);
  }, [startScan]);

  /* Rescan: consent-reuse. Same stored scope, no re-prompt; ask only if none stored. */
  const rescan = useCallback(() => {
    if (demoMode) { setDemoModal(true); return; } // demo can't scan anything
    const c = loadConsent();
    if (c) startScan(c.roots, c.shellHistory === true);
    else setConsentOpen(true);
  }, [startScan, demoMode]);

  /* Error retry: prefer the exact scope of the failed attempt, then stored consent. */
  const retry = useCallback(() => {
    const last = lastScanRef.current;
    if (last && last.roots && last.roots.length) { startScan(last.roots, last.shellHistory); return; }
    const c = loadConsent();
    if (c) startScan(c.roots, c.shellHistory === true);
    else setConsentOpen(true);
  }, [startScan]);

  // Poll /api/progress at 400ms — ONLY while scanning (SPEC).
  useEffect(() => {
    if (phase !== 'scanning') return;
    let stop = false, sawRunning = false, idleTicks = 0;
    const tick = async () => {
      try {
        const r = await fetchJSON('/api/progress');
        if (stop || !r.ok || !r.body) return;
        const p = r.body;
        setProgress(p);
        // The server 202s POST /api/scan and reports failures via progress.
        if (p.phase === 'error') {
          stop = true; clearInterval(iv);
          setErrMsg('The scan failed — ' + (p.error || 'unknown error') + '. Fix that, then retry.');
          setPhase('error');
          return;
        }
        if (p.running) { sawRunning = true; return; }
        // Not running: confirm the result is fresh before declaring done
        // (guards against reading a stale scan.json from a previous run).
        idleTicks++;
        const sr = await fetchJSON('/api/scan');
        if (stop) return;
        const s = sr.ok ? sr.body : null;
        const fresh = s && (p.phase === 'done' || sawRunning ||
          new Date(s.generatedAt).getTime() >= scanStartedAt.current - 5000);
        if (fresh) { stop = true; clearInterval(iv); finishScan(s); }
        else if (idleTicks > 25) {
          stop = true; clearInterval(iv);
          setErrMsg('The scan never reported progress. Check the server log, then retry.');
          setPhase('error');
        }
      } catch (e) {
        if (!stop) {
          stop = true; clearInterval(iv);
          setErrMsg('Lost the local server mid-scan. Check that `node server.js` is still running, then retry.');
          setPhase('error');
        }
      }
    };
    tick();
    const iv = setInterval(tick, POLL_MS);
    return () => { stop = true; clearInterval(iv); };
  }, [phase, finishScan]);

  const automate = useCallback(async finding => {
    if (demoMode) {
      // Demo drafts complete the loop client-side: a short drafting interstitial,
      // then a sample brief rendered in the browser. No network calls.
      setAutoMap(m => ({ ...m, [finding.id]: { ...(m[finding.id] || {}), status: 'drafting', error: null } }));
      setTimeout(() => {
        setAutoMap(m => ({
          ...m,
          [finding.id]: {
            ...(m[finding.id] || {}),
            status: 'briefed',
            brief: renderDemoBrief(finding),
            briefPath: DEMO_PLAYBOOKS + finding.id + '/BRIEF.md',
          },
        }));
      }, 250);
      return;
    }
    setAutoMap(m => ({ ...m, [finding.id]: { ...(m[finding.id] || {}), status: 'drafting', error: null } }));
    try {
      const r = await fetchJSON('/api/automate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ findingId: finding.id }),
      });
      if (!r.ok) throw new Error((r.body && r.body.error) || ('server answered ' + r.status));
      setAutoMap(m => ({
        ...m,
        [finding.id]: { status: 'briefed', briefPath: r.body.briefPath, brief: r.body.brief },
      }));
    } catch (e) {
      setAutoMap(m => ({ ...m, [finding.id]: { ...(m[finding.id] || {}), status: 'error', error: e.message } }));
    }
  }, [demoMode]);

  /* Score loop: mark a receipt automated/dismissed, or undo back to idle. The
     server recomputes the score; the topbar animates to the returned numbers.
     Demo mode runs the identical math client-side — never POSTs. */
  const setFindingStatus = useCallback(async (finding, status) => {
    if (demoMode) {
      const next = {
        ...autoMap,
        [finding.id]: { ...(autoMap[finding.id] || {}), status, statusError: null, statusPending: false },
      };
      setAutoMap(next);
      const statusById = {};
      Object.keys(next).forEach(id => { statusById[id] = next[id].status; });
      setScan(s => (s ? { ...s, score: { ...s.score, ...recomputeScoreFrom(s, statusById) } } : s));
      return;
    }
    setAutoMap(m => ({ ...m, [finding.id]: { ...(m[finding.id] || {}), statusPending: true, statusError: null } }));
    try {
      const r = await fetchJSON('/api/finding-status', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ findingId: finding.id, status }),
      });
      if (!r.ok) throw new Error((r.body && r.body.error) || ('server answered ' + r.status));
      const a = (r.body.finding && r.body.finding.automation) || {};
      const st = ['briefed', 'automated', 'dismissed'].indexOf(a.status) !== -1 ? a.status : 'idle';
      setAutoMap(m => ({
        ...m,
        [finding.id]: {
          ...(m[finding.id] || {}),
          status: st,
          briefPath: a.briefPath || (m[finding.id] || {}).briefPath || null,
          statusPending: false,
        },
      }));
      setScan(s => {
        if (!s) return s;
        const fs = (s.findings || []).map(f => (f.id === finding.id ? { ...f, automation: a } : f));
        return { ...s, findings: fs, score: { ...s.score, ...r.body.score } };
      });
    } catch (e) {
      setAutoMap(m => ({
        ...m,
        [finding.id]: {
          ...(m[finding.id] || {}),
          statusPending: false,
          statusError: e.message || 'the local server did not respond',
        },
      }));
    }
  }, [demoMode, autoMap]);

  /* ---- overnight: loaders + actions (never in demo) ---- */
  const loadOvernight = useCallback(async () => {
    if (demoMode) return;
    try {
      const [t, i, l, e] = await Promise.all([
        fetchJSON('/api/tasks'), fetchJSON('/api/inbox'), fetchJSON('/api/ledger'), fetchJSON('/api/env'),
      ]);
      if (e.ok && e.body) setAgentEnv(e.body);
      if (t.ok && t.body) { setTasks(t.body.tasks || []); setWatchOn(!!t.body.watch); }
      if (i.ok && i.body) setInbox(i.body.items || []);
      if (l.ok && l.body) setLedger(l.body);
      if (t.ok && t.body) {
        const map = {};
        (t.body.tasks || []).forEach(x => { map[x.findingId] = { taskId: x.id }; });
        setArmMap(map);
      }
    } catch (e) { /* server gone — views show what they have */ }
  }, [demoMode]);

  useEffect(() => {
    if (phase === 'report' && !demoMode) loadOvernight();
  }, [phase, view, demoMode, loadOvernight]); // view: entering Inbox/Tasks refetches

  // Switch which agent Latent uses (only offered when more than one is installed).
  const chooseRunner = useCallback(async (id) => {
    setAgentEnv(e => (e ? { ...e, preferred: id } : e)); // optimistic
    try {
      const r = await fetchJSON('/api/env', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ preferred: id }),
      });
      if (r.ok && r.body) setAgentEnv(prev => ({ ...(prev || {}), runners: r.body.runners, preferred: r.body.preferred }));
    } catch (e) { loadOvernight(); }
  }, [loadOvernight]);

  // Schedules are inferred from what the finding IS; editable later in Tasks.
  const inferSchedule = f => {
    const k = (f.automation && f.automation.kind) || '';
    if (k === 'recurring-draft' || k === 'report-assembler') return { type: 'weekly', dow: 1, hour: 7 };
    if (k === 'file-organizer') return { type: 'interval', days: 7 };
    return { type: 'manual' };
  };

  const armFinding = useCallback(async finding => {
    if (demoMode) { setDemoModal(true); return; }
    setArmMap(m => ({ ...m, [finding.id]: { pending: true } }));
    try {
      const r = await fetchJSON('/api/tasks', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ findingId: finding.id, schedule: inferSchedule(finding) }),
      });
      if (!r.ok) throw new Error((r.body && r.body.error) || ('server answered ' + r.status));
      setArmMap(m => ({ ...m, [finding.id]: { taskId: r.body.task.id } }));
      loadOvernight();
    } catch (e) {
      setArmMap(m => ({ ...m, [finding.id]: { error: e.message } }));
    }
  }, [demoMode, loadOvernight]);

  const inboxAct = useCallback(async (item, action) => {
    try {
      const r = await fetchJSON('/api/inbox', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ itemId: item.id, action }),
      });
      if (r.ok && r.body) {
        if (r.body.offerAuto) {
          const t = tasks.find(x => x.id === item.taskId);
          setAutoOffer({ taskId: item.taskId, title: item.title, approvals: ((t && t.approvals) || 2) + 1 });
        }
      }
    } catch (e) { /* reload below tells the truth either way */ }
    loadOvernight();
  }, [tasks, loadOvernight]);

  const taskAct = useCallback(async (task, action) => {
    try {
      await fetchJSON('/api/tasks', {
        method: 'PATCH', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ taskId: task.id, action }),
      });
    } catch (e) { /* reload shows reality */ }
    if (action === 'run-now') setView('inbox');
    setTimeout(loadOvernight, action === 'run-now' ? 1200 : 0);
  }, [loadOvernight]);

  const autoDecide = useCallback(async (offer, goAuto) => {
    setAutoOffer(null);
    if (goAuto) {
      await taskAct({ id: offer.taskId }, 'autonomy-auto');
    }
  }, [taskAct]);

  const viewBrief = useCallback(async finding => {
    const st = autoMap[finding.id] || {};
    let brief = st.brief;
    if (!brief && demoMode) brief = renderDemoBrief(finding); // demo never fetches
    if (!brief) {
      let r;
      try {
        r = await fetchJSON('/api/brief?id=' + encodeURIComponent(finding.id));
      } catch (e) {
        setAutoMap(m => ({
          ...m,
          [finding.id]: { ...(m[finding.id] || {}), briefError: e.message || 'the local server did not respond' },
        }));
        return;
      }
      brief = (r.ok && r.body && r.body.brief) || 'The brief could not be loaded. Draft it again.';
      setAutoMap(m => ({ ...m, [finding.id]: { ...(m[finding.id] || {}), briefError: null } }));
    }
    const briefPath = st.briefPath || (finding.automation && finding.automation.briefPath) || ('playbooks/' + finding.id + '/BRIEF.md');
    const dir = String(briefPath).replace(/\/?BRIEF\.md$/, '');
    // Latent is a dispatcher: the run command adapts to whichever agent CLI this
    // machine has. None found -> no fake command; the brief itself is the artifact.
    const bins = (agentEnv && agentEnv.bins) || {};
    const line = (id) => 'cd ' + shq(dir) + ' && ' + shq(bins[id] || id) + (id === 'codex' ? ' exec ' : ' -p ') + '"$(cat BRIEF.md)"';
    const RUN_LINES = { claude: line('claude'), codex: line('codex'), gemini: line('gemini') };
    const preferred = agentEnv && agentEnv.preferred;
    setBriefModal({
      title: finding.title,
      brief,
      dir,
      // Detected runner wins; otherwise default to claude so a missed detection
      // never hides a command the user can actually run.
      runLine: demoMode ? INSTALL_CMD : (RUN_LINES[preferred] || RUN_LINES.claude),
      detected: !!preferred,
      demo: demoMode,
    });
  }, [autoMap, demoMode, agentEnv]);

  // Share card: draw once fonts are in, so the canvas type matches the page.
  useEffect(() => {
    if (!shareOpen || !scan) return;
    const draw = () => { if (canvasRef.current) drawShareCard(canvasRef.current, scan); };
    draw();
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(draw);
  }, [shareOpen, scan]);

  const downloadCard = useCallback(() => {
    if (!canvasRef.current) return;
    const a = document.createElement('a');
    a.download = 'latent-card.png';
    a.href = canvasRef.current.toDataURL('image/png');
    a.click();
  }, []);

  /* ---------- views ---------- */

  // The consent panel is reachable from the landing ("Read my machine"), the
  // report topbar ("Folders", and "Rescan" with nothing stored), and error retry.
  const storedConsent = consentOpen ? (loadConsent() || {}) : {};
  const consentModal = consentOpen ? (
    <ConsentModal
      storedRoots={storedConsent.roots || null}
      storedShell={storedConsent.shellHistory === true}
      onClose={() => setConsentOpen(false)}
      onStart={consentStart}
    />
  ) : null;

  // Demo explainer: shown whenever a demo visitor tries to scan/draft anything.
  const viewSample = () => {
    setDemoModal(false);
    if (!demoRevealSeen.current && !REDUCED_MOTION && scan && scan.findings && scan.findings.length) {
      demoRevealSeen.current = true;
      setFreshReport(true); setPhase('reveal');
    } else {
      setFreshReport(false); setPhase('report');
    }
  };
  const demoModalEl = demoModal ? (
    <Modal
      title="Latent runs on your machine, not in the cloud"
      onClose={() => setDemoModal(false)}
      footer={
        <React.Fragment>
          <button className="btn btn-primary" onClick={viewSample}>View the sample report</button>
          <button className="btn btn-ghost" onClick={() => setDemoModal(false)}>Close</button>
        </React.Fragment>
      }
    >
      <p className="state-body">
        This site is a demo with sample data. Latent reads your files locally — so it has to
        run where your files are. Get your own report:
      </p>
      <pre className="brief-pre demo-install">{DEMO_INSTALL}</pre>
      <p className="state-body">
        Then open http://localhost:8820. Nothing your machine holds ever leaves it.
      </p>
    </Modal>
  ) : null;

  if (phase === 'idle') {
    return (
      <React.Fragment>
        <Landing
          hasLast={hasLast}
          demo={demoMode}
          onRead={() => (demoMode ? setDemoModal(true) : setConsentOpen(true))}
          onViewLast={() => { setFreshReport(false); setPhase('report'); }}
        />
        {consentModal}
        {demoModalEl}
      </React.Fragment>
    );
  }

  if (phase === 'scanning') {
    const pct = Math.min(100, (progress.filesSeen / 60000) * 100);
    return (
      <div>
        <div className="brand-corner"><span className="wordmark">Latent</span></div>
        <main className="scan" aria-live="polite">
          <div className="eyebrow">Reading — {progress.phase || 'walking'}</div>
          {scanRoots.length ? (
            <div className="scan-roots">
              {scanRoots.map(d => truncMid(d, 34)).join(' · ') + (scanShell ? ' · shell history' : '')}
            </div>
          ) : null}
          <div className="scan-count"><TickNumber value={progress.filesSeen || 0} /></div>
          <div className="scan-count-label">files</div>
          <div className="scan-path">{truncMid(homeToTilde(progress.currentPath) || '—', 76)}</div>
        </main>
        <div className="trace" aria-hidden="true"><div className="trace-fill" style={{ width: pct + '%' }}></div></div>
      </div>
    );
  }

  if (phase === 'reveal' && scan) {
    return <Reveal scan={scan} onDone={() => { setFreshReport(true); setPhase('report'); }} />;
  }

  if (phase === 'error') {
    return (
      <div>
        <div className="brand-corner"><span className="wordmark">Latent</span></div>
        <main className="state-card">
          <h1 className="state-title">The read failed.</h1>
          <p className="state-body">{errMsg || 'Something went wrong talking to the local server.'}</p>
          <button className="btn btn-primary" onClick={retry}>Retry</button>
          {hasLast && scan ? (
            <div className="idle-last">
              <button className="btn-text" onClick={() => { setFreshReport(false); setPhase('report'); }}>
                View the last read
              </button>
            </div>
          ) : null}
        </main>
        {consentModal}
        {demoModalEl}
      </div>
    );
  }

  // ---------- report ----------
  const score = (scan && scan.score) || {};
  const empty = findings.length === 0;
  // Cold receipts sink below active ones: active by hours desc (the memo's
  // order), then automated, then dismissed. Numbering runs over ACTIVE only.
  const handledOf = f => {
    const st = autoMap[f.id];
    const s = (st && st.status) || (f.automation && f.automation.status);
    return s === 'automated' || s === 'dismissed' ? s : null;
  };
  const activeList = findings.filter(f => !handledOf(f));
  const coldList = findings.filter(f => handledOf(f) === 'automated')
    .concat(findings.filter(f => handledOf(f) === 'dismissed'));
  const allHandled = !empty && activeList.length === 0;

  return (
    <div>
      <header className="topbar">
        <span className="wordmark">Latent</span>
        {demoMode ? <span className="chip-demo">DEMO — sample data</span> : null}
        <TopStats
          value={score.value != null ? score.value : null}
          hours={score.recoverableHoursPerWeek || 0}
        />
        {!demoMode ? (
          <nav className="tabs" aria-label="Views">
            <button className={'tab' + (view === 'report' ? ' on' : '')} onClick={() => setView('report')}>Report</button>
            <button className={'tab' + (view === 'inbox' ? ' on' : '')} onClick={() => setView('inbox')}>
              Inbox{inbox.filter(i => i.status === 'awaiting').length ? <span className="n"> · {inbox.filter(i => i.status === 'awaiting').length}</span> : null}
            </button>
            <button className={'tab' + (view === 'tasks' ? ' on' : '')} onClick={() => setView('tasks')}>Tasks{tasks.length ? <span className="n"> · {tasks.length}</span> : null}</button>
          </nav>
        ) : null}
        <span className="topbar-spacer"></span>
        {ledger.totalHours > 0 ? <span className="ratchet">worked {ledger.totalHours} h for you</span> : null}
        <button className="btn btn-ghost" onClick={rescan}>{demoMode ? 'Read my machine' : 'Rescan'}</button>
        {!demoMode ? <button className="btn btn-ghost" onClick={() => setConsentOpen(true)}>Folders</button> : null}
        {!empty ? <button className="btn btn-ghost" onClick={() => setShareOpen(true)}>Share card</button> : null}
      </header>

      {view === 'inbox' && !demoMode ? (
        <InboxView items={inbox} onAct={inboxAct} autoOffer={autoOffer} onAutoDecide={autoDecide} watchOn={watchOn} tasksCount={tasks.length} />
      ) : view === 'tasks' && !demoMode ? (
        <TasksView tasks={tasks} onAct={taskAct} watchOn={watchOn} agentEnv={agentEnv} onChoose={chooseRunner} />
      ) : empty ? (
        <main className="state-card">
          <h1 className="state-title">Clean read.</h1>
          <p className="state-body">Either you're already leveraged — or point me at more roots.</p>
          <button className="btn btn-primary" onClick={rescan}>Rescan</button>
        </main>
      ) : (
        <main className="report-main">
          {allHandled ? (
            <div className="clean-sheet">
              <h2 className="state-title">Clean sheet.</h2>
              <p className="state-body">Rescan when you've shipped more work.</p>
              <div className="clean-sheet-score">LEVERAGE {score.value != null ? score.value : '—'}/100{tierOf(score.value) ? ' · ' + tierOf(score.value) : ''}</div>
              <button className="btn btn-primary" onClick={rescan}>Rescan</button>
            </div>
          ) : (
            <React.Fragment>
              {roastLine(activeList) ? (
                <p className="roast">{roastLine(activeList)} <span className="roast-dim">It has receipts.</span></p>
              ) : null}
              <div className="report-intro">
                <h2 className="report-title">{activeList.length} receipt{activeList.length === 1 ? '' : 's'}, hottest first</h2>
                <span className="report-sub">
                  {scan.stats ? scan.stats.files.toLocaleString() + ' files · ' + scan.stats.repos + ' repos · read ' : ''}
                  {scan.generatedAt ? new Date(scan.generatedAt).toLocaleString() : ''}
                </span>
              </div>
              {activeList.map((f, i) => (
                <ReceiptCard
                  key={f.id}
                  finding={f}
                  index={i}
                  maxEst={maxEst}
                  stagger={freshReport && !REDUCED_MOTION}
                  autoState={autoMap[f.id] || { status: 'idle' }}
                  onAutomate={automate}
                  onViewBrief={viewBrief}
                  onSetStatus={setFindingStatus}
                  onArm={armFinding}
                  armState={armMap[f.id]}
                />
              ))}
            </React.Fragment>
          )}
          {coldList.length ? (
            <React.Fragment>
              <div className="cold-head">Handled · {coldList.length}</div>
              {coldList.map(f => (
                <ColdRow
                  key={f.id}
                  finding={f}
                  status={handledOf(f)}
                  pending={(autoMap[f.id] || {}).statusPending}
                  error={(autoMap[f.id] || {}).statusError}
                  onUndo={f2 => setFindingStatus(f2, 'idle')}
                />
              ))}
            </React.Fragment>
          ) : null}
        </main>
      )}

      <footer className="footer">
        <details className="method">
          <summary>Methodology</summary>
          <div className="method-body">
            <p>{score.methodology || 'score = clamp(round(100 − 9 × hours), 4, 96); hours = sum of per-finding estimates, each capped.'}</p>
            <ul>
              {DETECTOR_FORMULAS.map(([name, formula]) => (
                <li key={name}>{name} — {formula}</li>
              ))}
            </ul>
          </div>
        </details>
        <p className="footer-privacy">Latent reads your filesystem locally. Nothing leaves this machine.</p>
      </footer>

      {briefModal ? (
        <Modal
          title={briefModal.title}
          onClose={() => setBriefModal(null)}
          footer={
            <div className="brief-footer">
              {!briefModal.demo ? (
                <div className="brief-footer-row">
                  <AgentPicker env={agentEnv} onChoose={chooseRunner} />
                </div>
              ) : null}
              {!briefModal.demo ? (
                <span className="report-sub">
                  Open a new terminal tab (⌘T) — this one is running Latent — and paste. First time with
                  this agent, make sure it's logged in for headless use (Claude: run it once and type /login).
                </span>
              ) : null}
              <div className="brief-footer-row">
                {briefModal.demo ? <span className="report-sub">Get your own briefs:</span> : null}
                <code className="run-line">{briefModal.demo ? briefModal.runLine : liveRunLine(briefModal, agentEnv)}</code>
                <CopyButton text={briefModal.demo ? briefModal.runLine : liveRunLine(briefModal, agentEnv)}
                            label={briefModal.demo ? 'Copy install command' : 'Copy run command'} />
              </div>
              {!briefModal.demo && (!agentEnv || !agentEnv.preferred) ? (
                <div className="brief-footer-alt">
                  <span className="report-sub">
                    No agent CLI detected on this machine. The command above assumes Claude Code — if you
                    have it, paste it in your terminal. Otherwise copy the brief into any AI assistant:
                  </span>
                  <CopyButton text={briefModal.brief} label="Copy the brief" />
                </div>
              ) : null}
            </div>
          }
        >
          {briefModal.demo ? (
            <div className="brief-banner">
              <div>SAMPLE BRIEF — on your machine this is a real file in playbooks/, ready to run.</div>
              <button className="btn-text quiet" onClick={() => setDemoModal(true)}>Get the real thing</button>
            </div>
          ) : null}
          <pre className="brief-pre">{briefModal.brief}</pre>
        </Modal>
      ) : null}

      {shareOpen && scan ? (
        <Modal
          title="Share card"
          onClose={() => setShareOpen(false)}
          footer={
            <React.Fragment>
              <span className="report-sub">1200 × 630 PNG, rendered locally.</span>
              <span className="topbar-spacer"></span>
              <button className="btn btn-primary" onClick={downloadCard}>Download PNG</button>
            </React.Fragment>
          }
        >
          {/* SPEC: canvas is a replaced element — explicit width/height attributes required. */}
          <canvas ref={canvasRef} className="share-canvas" width="1200" height="630"
                  aria-label="Share card preview"></canvas>
        </Modal>
      ) : null}

      {consentModal}
      {demoModalEl}
    </div>
  );
}

/* ---------- reveal choreography (~4s, click to skip; never mounted under reduced motion) ---------- */
function Reveal({ scan, onDone }) {
  const [step, setStep] = useState(0); // 1: stats · 2: number counts · 3: annual line · 4: score stamp
  useEffect(() => {
    const timers = [
      setTimeout(() => setStep(1), 120),
      setTimeout(() => setStep(2), 750),
      setTimeout(() => setStep(3), 2650),
      setTimeout(() => setStep(4), 3250),
      setTimeout(onDone, 4500),
    ];
    return () => timers.forEach(clearTimeout);
  }, [onDone]);

  const stats = scan.stats || {};
  const score = scan.score || {};
  const secs = ((stats.durationMs || 0) / 1000).toFixed(1);
  const annual = workWeeksLine(score.recoverableHoursPerWeek || 0);
  const tier = tierOf(score.value);

  return (
    <main className="reveal" onClick={onDone}>
      <div className={'rv reveal-stats' + (step >= 1 ? ' on' : '')}>
        {(stats.files || 0).toLocaleString()} files · {stats.repos || 0} repos · {secs}s
      </div>
      <div className={'rv' + (step >= 2 ? ' on' : '')}>
        <div className="big-number heat-text" aria-live="polite">
          <CountUp to={score.recoverableHoursPerWeek || 0} dur={1800} play={step >= 2} />
        </div>
        <div className="big-number-label">estimated hours/week you're doing by hand that AI can already do</div>
      </div>
      {annual ? (
        <div className={'rv reveal-annual' + (step >= 3 ? ' on' : '')}>{annual}</div>
      ) : null}
      <div className={'rv rv-stamp' + (step >= 4 ? ' on' : '')}>
        <span className="stamp">LEVERAGE {score.value != null ? score.value : '—'}/100{tier ? ' · ' + tier : ''}</span>
      </div>
      <button className="skip-hint" onClick={onDone}>Click to skip</button>
    </main>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
