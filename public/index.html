<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<meta name="description" content="Latent reads your machine locally and shows, with receipts, the work you keep doing by hand that AI can already do.">
<title>Latent — read your machine</title>
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="7" fill="%230E0C0A"/><defs><linearGradient id="h" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="%23FF7A1A"/><stop offset="1" stop-color="%23FF3D5E"/></linearGradient></defs><circle cx="16" cy="16" r="7" fill="url(%23h)"/></svg>'>
<!-- Type trio per SPEC: Bricolage Grotesque (display) / Archivo (body) / IBM Plex Mono (data). One link. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500&family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   LATENT — thermal instrument.
   Semantic color law (SPEC): the heat ramp (--ember → --magma)
   may color DATA ONLY — hours, severity bars, scan trace.
   --glacier may color HANDLED states only (briefed / reclaimed).
   Everything else is carbon / soot / seam / bone / ash. No
   decorative accents, anywhere.
   ============================================================ */
:root {
  --carbon: #0E0C0A;   /* bg, warm near-black */
  --soot:   #1A1512;   /* panels */
  --seam:   #2A211B;   /* borders */
  --bone:   #EDE6DC;   /* ink */
  --ash:    #9C8F80;   /* muted */
  --ember:  #FF7A1A;   /* heat ramp start — data only */
  --magma:  #FF3D5E;   /* heat ramp end — data only */
  --glacier:#7ED7FF;   /* handled/briefed only — never decorative */
  --heat: linear-gradient(97deg, var(--ember) 8%, var(--magma) 92%);
  --font-display: 'Bricolage Grotesque', 'Archivo', system-ui, sans-serif;
  --font-sans: 'Archivo', -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif;
  --font-mono: 'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  color-scheme: dark;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: auto; }
body {
  background: var(--carbon);
  color: var(--bone);
  font: 400 15px/1.6 var(--font-sans);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
::selection { background: #3A2C22; }
button { font: inherit; color: inherit; }
:focus-visible { outline: 2px solid var(--bone); outline-offset: 2px; border-radius: 4px; }

/* ---------- shared atoms ---------- */
.mono   { font-family: var(--font-mono); }
.wordmark {
  font: 800 13px var(--font-display);
  letter-spacing: 0.34em;
  color: var(--bone);
  text-transform: uppercase;
  user-select: none;
}
.eyebrow {
  font: 500 11px var(--font-mono);
  letter-spacing: 0.12em;
  color: var(--ash);
  text-transform: uppercase;
}
/* heat gradient on TEXT — hours/severity numbers only */
.heat-text {
  background: var(--heat);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.btn {
  display: inline-flex; align-items: center; gap: 8px;
  border: 1px solid transparent; border-radius: 8px;
  padding: 11px 22px; cursor: pointer; background: none;
  font: 500 14px var(--font-sans); color: var(--bone);
  transition: background .15s ease, border-color .15s ease, color .15s ease;
}
.btn:disabled, .btn[aria-disabled="true"] { opacity: .45; cursor: default; }
.btn-primary { background: var(--bone); color: var(--carbon); border-color: var(--bone); }
.btn-primary:hover:not(:disabled) { background: #FFFCF6; }
.btn-ghost { border-color: var(--seam); }
.btn-ghost:hover:not(:disabled) { border-color: var(--ash); }
.btn-text {
  border: none; background: none; padding: 4px 2px; border-radius: 4px;
  font: 500 13px var(--font-mono); color: var(--bone);
  text-decoration: underline; text-underline-offset: 3px;
  text-decoration-color: var(--seam); cursor: pointer;
}
.btn-text:hover { text-decoration-color: var(--ash); }
.btn-text:disabled { opacity: .45; cursor: default; }
.btn-text.quiet { color: var(--ash); }
.btn-text.quiet:hover:not(:disabled) { color: var(--bone); }

.brief-footer { display: flex; flex-direction: column; gap: 12px; width: 100%; }
.brief-footer-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.brief-footer-alt { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; padding-top: 10px; border-top: 1px solid var(--seam); }
.agent-tag { font: 500 12px var(--font-mono); color: var(--ash); letter-spacing: .04em; }
.agent-none { color: var(--ember); }
.agent-pick { display: inline-flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.agent-tag-label { font: 500 12px var(--font-mono); color: var(--ash); }
.agent-opt {
  border: 1px solid var(--seam); background: none; cursor: pointer;
  font: 500 12px var(--font-mono); color: var(--ash);
  border-radius: 999px; padding: 3px 11px;
}
.agent-opt.on { color: var(--glacier); border-color: rgba(126,215,255,.4); }
.tasks-agent-row { margin-bottom: 16px; }

/* demo marker — quiet, never heat/glacier */
.chip-demo {
  display: inline-flex; align-items: center;
  font: 500 11px var(--font-mono); letter-spacing: 0.08em;
  color: var(--ash); border: 1px solid var(--seam);
  border-radius: 999px; padding: 4px 11px; white-space: nowrap;
}
.hero-stats .chip-demo { margin-left: 12px; }
.demo-install { user-select: all; }

/* overnight: tabs, ratchet, inbox, tasks */
.tabs { display: inline-flex; gap: 18px; margin-left: 26px; }
.tab {
  border: none; background: none; cursor: pointer; padding: 4px 2px;
  font: 500 12.5px var(--font-mono); letter-spacing: 0.08em; color: var(--ash);
  text-transform: uppercase; border-bottom: 2px solid transparent;
}
.tab.on { color: var(--bone); border-bottom-color: var(--bone); }
.tab .n { color: var(--glacier); }
.ratchet { font: 500 12.5px var(--font-mono); color: var(--glacier); white-space: nowrap; }
.watch-hint {
  font: 400 12.5px/1.7 var(--font-mono); color: var(--ash);
  border: 1px solid var(--seam); border-radius: 10px; padding: 12px 16px; margin-bottom: 22px;
  overflow-wrap: anywhere;
}
.watch-hint code { color: var(--bone); }
.offer-banner {
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  border: 1px solid rgba(126,215,255,.35); border-radius: 12px;
  padding: 14px 18px; margin-bottom: 22px;
  font: 400 13.5px var(--font-mono); color: var(--bone);
}
.inbox-item { background: var(--soot); border: 1px solid var(--seam); border-radius: 14px; padding: 22px 24px; margin-bottom: 16px; }
.item-head { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; margin-bottom: 8px; }
.item-title { font: 700 17px var(--font-display); }
.item-when { font: 400 12px var(--font-mono); color: var(--ash); }
.item-files { font: 400 12.5px/1.8 var(--font-mono); color: var(--ash); margin: 8px 0; overflow-wrap: anywhere; }
.item-receipt { font: 400 12px/1.7 var(--font-mono); color: var(--ash); white-space: pre-wrap; max-height: 130px; overflow: hidden; border-left: 2px solid var(--seam); padding-left: 12px; margin: 10px 0; }
.chip-await { display: inline-flex; font: 500 11px var(--font-mono); letter-spacing: .06em; color: var(--bone); border: 1px solid var(--ash); border-radius: 999px; padding: 3px 10px; }
.chip-fail { display: inline-flex; font: 500 11px var(--font-mono); letter-spacing: .06em; color: var(--ember); border: 1px solid rgba(255,122,26,.4); border-radius: 999px; padding: 3px 10px; }
.chip-ash { display: inline-flex; font: 500 11px var(--font-mono); letter-spacing: .06em; color: var(--ash); border: 1px solid var(--seam); border-radius: 999px; padding: 3px 10px; }
.task-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; background: var(--soot); border: 1px solid var(--seam); border-radius: 12px; padding: 16px 20px; margin-bottom: 12px; }
.task-title { font: 500 14.5px var(--font-sans); }
.task-meta { font: 400 12px var(--font-mono); color: var(--ash); }
.task-spacer { flex: 1; }

/* cold = handled. The only glacier in the building. */
.chip-cold {
  display: inline-flex; align-items: center; gap: 8px;
  font: 500 12px var(--font-mono); letter-spacing: 0.04em;
  color: var(--glacier); border: 1px solid rgba(126, 215, 255, 0.35);
  border-radius: 999px; padding: 5px 13px;
}
.chip-cold::before {
  content: ""; width: 6px; height: 6px; border-radius: 50%;
  background: var(--glacier); flex: none;
}

/* dismissed = set aside by the user, not handled by automation — ash, never glacier */
.chip-ash {
  display: inline-flex; align-items: center; gap: 8px;
  font: 500 12px var(--font-mono); letter-spacing: 0.04em;
  color: var(--ash); border: 1px solid var(--seam);
  border-radius: 999px; padding: 5px 13px;
}
.chip-ash::before {
  content: ""; width: 6px; height: 6px; border-radius: 50%;
  background: var(--ash); flex: none;
}

/* ---------- idle: the landing ---------- */
.brand-corner { position: fixed; top: 26px; left: 30px; z-index: 5; }
.idle-last { margin-top: 4px; }

.hero {
  position: relative; min-height: 92vh;
  display: flex; flex-direction: column; justify-content: center;
  padding: 118px 30px 84px; overflow: hidden;
  background: radial-gradient(1100px 640px at 50% -8%, #16110E, var(--carbon));
}
.hero-top {
  position: absolute; top: 0; left: 0; right: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 24px 30px;
}
.mono-link {
  font: 500 12px var(--font-mono); letter-spacing: 0.08em;
  color: var(--ash); text-decoration: none;
}
.mono-link:hover { color: var(--bone); text-decoration: underline; text-underline-offset: 3px; }
.hero-grid {
  width: 100%; max-width: 1060px; margin: 0 auto;
  display: grid; grid-template-columns: minmax(0, 11fr) minmax(0, 9fr);
  gap: clamp(36px, 6vw, 84px); align-items: center;
}
.hero-h1 {
  font: 800 clamp(34px, 4.8vw, 54px)/1.06 var(--font-display);
  letter-spacing: -0.02em; margin: 18px 0; max-width: 14ch;
}
.hero-sub { color: var(--ash); font-size: 15.5px; max-width: 58ch; }
.hero-cta { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-top: 30px; }
.hero-stats { margin-top: 26px; font: 400 12px var(--font-mono); color: var(--ash); letter-spacing: 0.05em; }

/* specimen receipt — the one loud thing on the landing. Real card styles, sample data. */
.specimen { text-align: left; animation: specFloat 8s ease-in-out infinite alternate; }
@keyframes specFloat { from { transform: translateY(0); } to { transform: translateY(-4px); } }
.specimen .card-title { font-size: 21px; }
/* bar fills on load; reduced-motion (animation:none) leaves the 70% base width — bar full */
.spec-fill { width: 70%; animation: specFill 1.2s cubic-bezier(.2,.7,.3,1) .4s both; }
@keyframes specFill { from { width: 0; } }

/* heat trace at the hero's floor — slow ambient sweep; static 30% under reduced motion */
.hero-trace { position: absolute; left: 0; right: 0; bottom: 0; height: 3px; background: var(--soot); overflow: hidden; }
.hero-trace-fill {
  height: 100%; width: 30%; background: var(--heat); opacity: 0.5;
  animation: traceSweep 12s linear infinite;
}
/* element is 30% wide → 100% parent ≈ 334% own width; -100% → 334% crosses fully */
@keyframes traceSweep { from { transform: translateX(-100%); } to { transform: translateX(334%); } }

/* landing sections — same 880 column as the report */
.land-section { max-width: 880px; margin: 0 auto; padding: 88px 24px 0; }
.how-rows { margin-top: 20px; }
.how-row { display: grid; grid-template-columns: 72px minmax(0, 1fr); gap: 6px 26px; padding: 26px 0; }
.how-row + .how-row { border-top: 1px solid var(--seam); }
.how-num { font: 500 13px var(--font-mono); color: var(--ash); letter-spacing: 0.1em; padding-top: 4px; }
.how-h { font: 800 16px/1.25 var(--font-display); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 7px; }
.how-body { color: var(--ash); max-width: 62ch; }
.trust-title { font: 700 clamp(22px, 3vw, 28px)/1.2 var(--font-display); letter-spacing: -0.015em; }
.trust-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 24px; }
.trust-col { background: var(--soot); border: 1px solid var(--seam); border-radius: 12px; padding: 20px 22px; }
.trust-h { font: 700 11px var(--font-mono); letter-spacing: 0.2em; margin-bottom: 10px; }
.trust-col ul { list-style: none; }
.trust-col li { font: 400 12.5px/2.05 var(--font-mono); color: var(--ash); }
.trust-close { margin-top: 20px; color: var(--ash); max-width: 62ch; }
.trust-close .mono { font-size: 13px; color: var(--bone); }
.land-footer { margin-top: 96px; border-top: 1px solid var(--seam); }
.land-footer-inner {
  max-width: 880px; margin: 0 auto; padding: 26px 24px 46px;
  display: flex; flex-wrap: wrap; align-items: baseline; gap: 6px 14px;
  font: 400 12px/1.8 var(--font-mono); color: var(--ash);
}

/* ---------- scanning ---------- */
.scan {
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center;
  padding: 96px 24px 120px; gap: 18px;
}
.scan-count {
  font: 500 clamp(64px, 13vw, 128px)/1 var(--font-mono);
  font-variant-numeric: tabular-nums; letter-spacing: -0.03em;
}
.scan-count-label { font: 500 12px var(--font-mono); letter-spacing: 0.22em; color: var(--ash); text-transform: uppercase; }
.scan-path {
  margin-top: 22px; font: 400 12.5px var(--font-mono); color: var(--ash);
  white-space: nowrap; max-width: min(92vw, 860px);
  overflow: hidden; text-overflow: ellipsis; /* 76ch mono > narrow viewports — never widen the page */
}
.scan-roots {
  margin-top: -8px; font: 400 12px var(--font-mono); color: var(--ash);
  letter-spacing: 0.04em; max-width: min(92vw, 860px); overflow-wrap: anywhere;
}
/* the trace: scan progress rendered as heat — this is data */
.trace { position: fixed; left: 0; bottom: 0; width: 100%; height: 3px; background: var(--soot); }
.trace-fill { height: 100%; background: var(--heat); width: 0; transition: width .4s linear; }

/* ---------- reveal ---------- */
.reveal {
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center;
  padding: 96px 24px; gap: 22px; cursor: pointer;
}
.rv { opacity: 0; }
.rv.on { animation: fadeUp .55s cubic-bezier(.2,.7,.3,1) both; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
.reveal-stats { font: 400 13px var(--font-mono); color: var(--ash); letter-spacing: 0.06em; }
/* THE NUMBER — the one loud thing on the whole instrument */
.big-number {
  font: 800 clamp(96px, 17vw, 140px)/0.95 var(--font-display);
  letter-spacing: -0.03em; font-variant-numeric: tabular-nums;
}
.big-number-label {
  margin-top: 14px; font: 400 12.5px var(--font-mono); color: var(--ash);
  letter-spacing: 0.08em; max-width: 46ch;
}
.stamp {
  display: inline-block; margin-top: 10px;
  font: 700 15px var(--font-mono); letter-spacing: 0.16em;
  color: var(--bone); border: 2px solid var(--bone);
  border-radius: 6px; padding: 9px 16px;
}
.rv-stamp.on { animation: stampIn .26s cubic-bezier(.25,.9,.3,1.1) both; }
@keyframes stampIn { from { opacity: 0; transform: scale(1.15); } to { opacity: 1; transform: scale(1); } }
.skip-hint {
  position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%);
  border: none; background: none; cursor: pointer;
  font: 400 11px var(--font-mono); letter-spacing: 0.14em;
  color: var(--ash); text-transform: uppercase; padding: 6px 10px;
}

/* ---------- report ---------- */
.topbar {
  position: sticky; top: 0; z-index: 20;
  display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  padding: 14px 30px; border-bottom: 1px solid var(--seam);
  background: rgba(14, 12, 10, 0.92);
  -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
}
.topbar-stat { font: 500 12.5px var(--font-mono); letter-spacing: 0.06em; white-space: nowrap; }
.topbar-stat .dim { color: var(--ash); }
.topbar-spacer { flex: 1; }
.topbar .btn { padding: 8px 16px; font-size: 13px; }
/* THE MOMENT: one subtle pulse on the score when it rises — earned, not loud */
.stat-pulse { transform-origin: left center; }
.stat-pulse.on { animation: statPulse .18s cubic-bezier(.25,.9,.3,1.1) both; }
@keyframes statPulse { from { transform: scale(1.06); } to { transform: scale(1); } }

.report-main { max-width: 880px; margin: 0 auto; padding: 44px 24px 20px; }
.report-intro { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 26px; }

/* the roast — the machine gets one sentence, then shows its work */
.roast {
  font: 400 14px/1.65 var(--font-mono);
  color: var(--bone);
  border-left: 2px solid var(--ember);
  padding-left: 14px;
  margin-bottom: 30px;
  max-width: 64ch;
  overflow-wrap: anywhere;
}
.roast-dim { color: var(--ash); }

/* tier: identity label beside the score — same ink, quieter weight */
.tier { color: var(--bone); font-weight: 700; letter-spacing: 0.06em; }

/* reveal: the annual line lands after the count-up */
.reveal-annual {
  font: 500 clamp(17px, 2.4vw, 24px) var(--font-mono);
  letter-spacing: 0.02em;
  background: var(--heat);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.report-title { font: 700 22px/1.2 var(--font-display); letter-spacing: -0.01em; }
.report-sub { font: 400 12px var(--font-mono); color: var(--ash); letter-spacing: 0.05em; }

/* receipt card */
.card {
  background: var(--soot); border: 1px solid var(--seam); border-radius: 12px;
  padding: 26px 28px 24px;
}
.card + .card { margin-top: 14px; }
.card.stagger { animation: fadeUp .45s cubic-bezier(.2,.7,.3,1) both; }
.card-eyebrow-row { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
.card-title { font: 700 28px/1.15 var(--font-display); letter-spacing: -0.015em; margin-bottom: 8px; overflow-wrap: anywhere; }
.card-summary { color: var(--bone); max-width: 62ch; margin-bottom: 16px; overflow-wrap: anywhere; }
.ev-head { font: 500 11px var(--font-mono); letter-spacing: 0.12em; color: var(--ash); text-transform: uppercase; margin-bottom: 6px; }
.ev-row { font: 400 12.5px/1.75 var(--font-mono); color: var(--ash); overflow-wrap: anywhere; }
.ev-row .ev-detail { opacity: 0.8; }
.ev-more { font: 400 12px var(--font-mono); color: var(--ash); margin-top: 2px; }
.heat-row { display: flex; align-items: center; gap: 14px; margin: 18px 0 16px; }
/* severity bar — heat on data */
.heatbar-track {
  flex: 1; height: 6px; border-radius: 999px; overflow: hidden;
  background: var(--carbon); border: 1px solid var(--seam);
}
.heatbar-fill { height: 100%; border-radius: 999px; background: var(--heat); }
.heat-est { font: 500 12.5px var(--font-mono); white-space: nowrap; }
.card-actions { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.card-error { font: 400 12.5px var(--font-mono); color: var(--ash); }

/* cold rows — handled receipts, collapsed and sunk below the active list */
.cold-head {
  font: 500 11px var(--font-mono); letter-spacing: 0.14em;
  color: var(--ash); text-transform: uppercase; margin: 28px 0 4px;
}
.cold-row {
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  background: var(--soot); border: 1px solid var(--seam); border-radius: 12px;
  padding: 13px 20px; margin-top: 10px;
  animation: fadeUp .3s cubic-bezier(.2,.7,.3,1) both;
}
.cold-title { font: 500 14px var(--font-sans); color: var(--ash); flex: 1; min-width: 160px; overflow-wrap: anywhere; }
.cold-est { font: 400 12px var(--font-mono); color: var(--ash); text-decoration: line-through; white-space: nowrap; }

/* all receipts handled */
.clean-sheet {
  text-align: center; padding: 56px 0 30px;
  display: flex; flex-direction: column; align-items: center; gap: 14px;
}
.clean-sheet-score { font: 500 13px var(--font-mono); letter-spacing: 0.08em; color: var(--bone); }

/* empty / error states */
.state-card {
  max-width: 620px; margin: 18vh auto 0; text-align: center; padding: 0 24px;
  display: flex; flex-direction: column; align-items: center; gap: 18px;
}
.state-title { font: 700 clamp(24px, 3.4vw, 32px)/1.2 var(--font-display); letter-spacing: -0.01em; }
.state-body { color: var(--ash); max-width: 46ch; }

/* ---------- modal ---------- */
.overlay {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(8, 6, 5, 0.72);
  display: flex; align-items: center; justify-content: center; padding: 20px;
}
.modal {
  background: var(--soot); border: 1px solid var(--seam); border-radius: 14px;
  width: 100%; max-width: 760px; max-height: 84vh;
  display: flex; flex-direction: column; overflow: hidden;
}
.modal-head {
  display: flex; align-items: center; justify-content: space-between; gap: 14px;
  padding: 16px 22px; border-bottom: 1px solid var(--seam);
}
.modal-title { font: 700 16px var(--font-display); letter-spacing: -0.01em; }
.modal-close {
  border: 1px solid var(--seam); background: none; border-radius: 8px;
  width: 32px; height: 32px; cursor: pointer; color: var(--ash);
  font: 400 16px/1 var(--font-mono); flex: none;
}
.modal-close:hover { color: var(--bone); border-color: var(--ash); }
.modal-body { overflow: auto; padding: 20px 22px; }

<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- MANDATORY (SPEC): Babel 8 defaults to automatic JSX runtime, which emits imports
     and breaks non-module scripts. Register a classic-runtime preset and use it. -->
<script>Babel.registerPreset('react-classic',{presets:[[Babel.availablePresets['react'],{runtime:'classic'}]]});</script>
<script type="text/babel" data-presets="react-classic">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

/* prefers-reduced-motion: skip count-up, stagger, and the reveal choreography entirely. */
const REDUCED_MOTION = window.matchMedia &&
  window.matchMedia('(prefers-reduced-motion: reduce)').matches;

const MAX_RECEIPTS = 12;              // SPEC: cap displayed findings at 12
const POLL_MS = 400;                  // SPEC: poll /api/progress at 400ms, only while scanning
const CONSENT_KEY = 'latentConsent';  // {roots:[abs paths], shellHistory:bool, consentedAt: ISO}
/* Static-host demo (Vercel): no local server -> sample data + run-it-locally CTA. */
const INSTALL_CMD = 'npx github:AbhinavGGarg/latent'; // flip to 'npx latent-scan' after npm publish
const DEMO_INSTALL = INSTALL_CMD;
const DEMO_PLAYBOOKS = '/Users/sam/latent/playbooks/'; // the demo persona's machine

/* Demo briefs are rendered client-side so the loop completes without a server.
   Task paragraphs are copied verbatim from server.js KIND_TASKS, trimmed to the
   kinds present in demo-scan.json. */
const DEMO_KIND_TASKS = {
  'recurring-draft':
    'This is a recurring series. Open the evidence directory, sort the series by date, and read the two or three newest instances to learn the naming pattern, the date convention, and which sections stay stable versus which change each time. Then produce the NEXT instance in the series as a draft in ./out/: correct next filename per the pattern, stable structure carried over, every date and sequence marker advanced, and a clearly marked TODO placeholder wherever fresh input is required.',
  'template-extractor':
    'Compare the near-identical documents in the evidence and separate the invariant skeleton from the parts that vary per instance. Write ./out/TEMPLATE.md containing the shared structure with {{placeholder}} markers at each varying field, and ./out/FIELDS.md listing every placeholder with its meaning and one real example value drawn from the evidence files.',
  'test-writer':
    'Read the repository named in the evidence and map its public surface: exported functions, entry points, and the behaviors the code clearly promises. Write a plan first at ./out/PLAN.md listing what you will test and why, then write a runnable test suite into ./out/tests/ using the language the repo already uses and its stdlib test tooling (no new dependencies). Cover happy paths, the obvious edge cases, and one regression-style test for each bug-prone spot you notice. End the receipt with the exact one-line command that runs the suite.',
  'file-organizer':
    'Inventory the loose files in the evidence directory and design a small, predictable folder scheme for them — by type and date, at most two levels deep. Do not move anything. Write ./out/PLAN.md describing the scheme and why, then ./out/moves.sh: a reviewable shell script of mv commands (one per line, all paths quoted) that would carry the plan out, plus ./out/undo.sh that reverses every move.',
  'scaffold-skill':
    'Diff the sibling project directories in the evidence and extract the boilerplate fileset they share. Create ./out/scaffold/ holding a canonical starter copy of each shared file with project-specific values replaced by {{name}}-style placeholders, plus ./out/new-project.sh that stamps a fresh project directory out of the scaffold given a project name.',
  'report-assembler':
    'Read the CSV series in the evidence, confirm the shared header row, and load the most recent files. Produce ./out/report.md — the assembled report this series implies: period totals, deltas versus the previous period, notable outliers, and a compact summary table. Also write ./out/assemble.js, a Node stdlib-only script that regenerates the same report whenever a new CSV lands in that directory.',
  'doc-writer':
    'Read the repository named in the evidence — entry points, scripts, config — and reconstruct what the project is, how to run it, and how it is laid out. Write a complete README draft to ./out/README.md: a one-paragraph purpose statement, a quick start with exact commands, a file/module map, and any configuration or environment notes you can verify from the code itself. State only what the code demonstrates; mark anything inferred as an assumption.',
};
const DEMO_FALLBACK_TASK =
  'Study the evidence above and draft the automation that would remove this recurring manual step. Write a short plan and every proposed artifact to ./out/.';

/* Mirrors server.js renderBrief: same BRIEF.md shape, demo provenance line. */
function renderDemoBrief(finding) {
  const evidence = (finding.evidence || [])
    .map(e => '- ' + e.path + ' — ' + e.detail)
    .join('\n') || '- (no evidence rows)';
  const kind = finding.automation && finding.automation.kind;
  const task = DEMO_KIND_TASKS[kind] || DEMO_FALLBACK_TASK;
  const dir = '~/latent/playbooks/' + finding.id;
  return '# Automation brief — ' + finding.title + '\n' +
    'Generated by Latent (demo). Status: DRAFT-ONLY. Never send/submit/push; write artifacts to ./out/.\n' +
    '\n## What keeps happening\n' + finding.summary + '\n' +
    '\n## Evidence\n' + evidence + '\n' +
    '\n## Your task\n' + task + '\n' +
    '\n## Constraints\n' +
    '- Draft only. All output inside ' + dir + '/out/. Do not modify the evidence files.\n' +
    '- Leave a RECEIPT.md: what you read, what you produced.\n' +
    '\n(Sample brief — the paths above belong to the demo. On your machine, Latent\n' +
    'writes the real file and hands you a run command that points at it.)\n';
}

/* Client mirror of the server's live-score recompute — same formula as the
   scanner: clamp(round(100 - 9*hours), 4, 96). Used directly only in demo mode
   (real mode animates to the number the server returns). */
function recomputeScoreFrom(scanObj, statusById) {
  let hoursSum = 0;
  (scanObj.findings || []).forEach(f => {
    const st = statusById[f.id] || (f.automation && f.automation.status);
    if (st === 'automated' || st === 'dismissed') return;
    hoursSum += (f.metrics && f.metrics.estHoursPerWeek) || 0;
  });
  return {
    value: Math.min(96, Math.max(4, Math.round(100 - 9 * hoursSum))),
    recoverableHoursPerWeek: Math.round(hoursSum * 10) / 10,
  };
}

/* Consent persistence: scans only ever start through the consent panel; rescans
   reuse this stored scope without re-prompting. "View the last read" never needs it. */
function loadConsent() {
  try {
    const c = JSON.parse(localStorage.getItem(CONSENT_KEY));
    if (c && Array.isArray(c.roots) && c.roots.length &&
        c.roots.every(r => typeof r === 'string' && r.length)) return c;
  } catch (e) { /* absent or malformed — treat as no consent */ }
  return null;
}
function saveConsent(roots, shellHistory) {
  try {
    localStorage.setItem(CONSENT_KEY, JSON.stringify({
      roots,
      shellHistory: shellHistory === true,
      consentedAt: new Date().toISOString(),
    }));
  } catch (e) { /* storage may be unavailable; the scan still runs */ }
}

/* Per-detector estimate formulas, mirrored from the SPEC/ESTIMATES table for the
   methodology footer. Honesty is brand: show the math. */
const DETECTOR_FORMULAS = [
  ['version-chains',     '(chain length − 1) × 4 min, spread over the chain’s mtime span (min 1 wk) · cap 1.5 h/wk'],
  ['dated-recurrence',   'instances per week × 45 min (text) or 25 min · cap 3.0 h/wk'],
  ['near-duplicate-text','(cluster size − 1) × 12 min over span · cap 2.0 h/wk'],
  ['untested-repos',     '2.5 h one-shot ÷ 8 wk · cap 1.5 h/wk'],
  ['undocumented-repos', '40 min one-shot ÷ 8 wk · cap 0.5 h/wk'],
  ['screenshot-pileup',  'file count × 20 s over span · cap 0.3 h/wk'],
  ['downloads-entropy',  '15 min/wk + 5 min per 100 loose files · cap 0.8 h/wk'],
  ['commit-drudgery',    'generic-message rate × commits/wk × 2 min · cap 0.5 h/wk'],
  ['csv-report-assembly','same as dated-recurrence, on CSV series · cap 2.0 h/wk'],
  ['scaffold-repetition','35 min one-shot ÷ 8 wk · cap 0.7 h/wk'],
  ['shell-rituals',      'rituals: occurrences/wk × length × 20 s · cap 1.5 h/wk — aliases: occurrences/wk × 15 s · cap 0.5 h/wk'],
  ['node-modules-graveyard','20 min one-shot ÷ 8 wk · cap 0.3 h/wk (the GB total is measured, not estimated)'],
  ['unpushed-work',      '10 min one-shot ÷ 8 wk · cap 0.2 h/wk'],
  ['fossil-todos',       'marker count × 1 min ÷ 8 wk · cap 0.4 h/wk (age claimed only from file mtime)'],
];

/* ---------- helpers ---------- */

/* Middle-truncate, biased to keep the tail (SPEC: keep tail). */
function truncMid(s, max) {
  if (!s) return '';
  if (s.length <= max) return s;
  const tail = Math.ceil((max - 1) * 0.62);
  const head = max - 1 - tail;
  return s.slice(0, head) + '…' + s.slice(s.length - tail);
}

function homeToTilde(p) {
  return String(p || '').replace(/^\/(Users|home)\/[^/]+/, '~');
}

/* Score tiers: an identity is more shareable than a digit. Bands are fixed. */
function tierOf(score) {
  if (score == null) return null;
  if (score < 40) return 'ARTISAN';
  if (score < 65) return 'OPERATOR';
  if (score < 85) return 'AUTOMATOR';
  return 'GHOST';
}

/* Annualize the weekly estimate: same math, same "estimated" label, honest unit
   people actually feel. 2.3 h/wk reads as noise; three work-weeks a year does not. */
function workWeeksLine(hoursPerWeek) {
  const ww = (hoursPerWeek * 52) / 40;
  if (ww < 0.75) return null; // no drama for tiny numbers
  const n = ww >= 10 ? Math.round(ww) : Math.round(ww * 10) / 10;
  return '≈ ' + n + ' work-week' + (n === 1 ? '' : 's') + ' a year, estimated';
}

/* The roast: one plain sentence from the hottest active receipt. */
function roastLine(findings) {
  const f = findings && findings[0];
  if (!f) return null;
  const m = f.metrics || {};
  const T = {
    'shell-rituals': () => 'you typed the same ritual ' + m.count + ' times. It kept count.',
    'dated-recurrence': () => 'you rebuilt the same file ' + m.count + ' times, on a schedule, by hand.',
    'version-chains': () => 'you saved ' + m.count + ' hand-made copies of one file.',
    'near-duplicate-text': () => m.count + ' of your documents are the same document, retyped.',
    'untested-repos': () => m.count + ' of your repos have never met a test.',
    'undocumented-repos': () => m.count + ' of your repos ship with no README.',
    'downloads-entropy': () => m.count + ' loose files are living in your Downloads.',
    'screenshot-pileup': () => m.count + ' screenshots are waiting to be filed.',
    'commit-drudgery': () => 'your git history mostly says "fix". It saw everything.',
    'csv-report-assembly': () => 'you assembled the same table ' + m.count + ' times by hand.',
    'scaffold-repetition': () => 'you built the same project skeleton ' + m.count + ' times.',
    'node-modules-graveyard': () => (m.totalGB ? m.totalGB + ' GB of node_modules belong to projects you abandoned.' : 'dead projects are hoarding your disk.'),
    'unpushed-work': () => 'some of your work exists nowhere but this laptop.',
    'fossil-todos': () => m.count + ' TODOs are fossilizing in your code.',
  };
  const make = T[f.detector];
  const clause = make ? make() : (f.summary ? f.summary.charAt(0).toLowerCase() + f.summary.slice(1) : null);
  return clause ? 'Your machine says: ' + clause : null;
}

function detectorLabel(d) {
  return String(d || '').replace(/-/g, ' ').toUpperCase();
}

/* One-shot findings: label total hours once. Prefer an explicit field if the
   scanner provides one; otherwise invert the SPEC's "÷ 8wk" amortization. */
function oneShotHours(m) {
  if (m && m.estHoursOnce != null) return m.estHoursOnce;
  return (m && m.estHoursPerWeek || 0) * 8;
}

function estLabel(f) {
  const m = f.metrics || {};
  if (m.oneShot) return '~' + oneShotHours(m).toFixed(1) + ' h once';
  return '~' + (m.estHoursPerWeek || 0).toFixed(1) + ' h/wk';
}

async function fetchJSON(url, opts) {
  const r = await fetch(url, opts);
  let body = null;
  try { body = await r.json(); } catch (e) { /* non-JSON body */ }
  return { ok: r.ok, status: r.status, body };
}

function copyText(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    return navigator.clipboard.writeText(text);
  }
  // Fallback for non-secure contexts
  const ta = document.createElement('textarea');
  ta.value = text; ta.setAttribute('readonly', '');
  ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); } catch (e) {}
  document.body.removeChild(ta);
  return Promise.resolve();
}

/* ---------- share card (canvas 1200×630 — explicit attrs; replaced element) ---------- */
function drawShareCard(canvas, scan) {
  const W = 1200, H = 630;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0E0C0A';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#2A211B';
  ctx.lineWidth = 2;
  ctx.strokeRect(28, 28, W - 56, H - 56);

  const score = (scan.score && scan.score.value) != null ? scan.score.value : null;
  const hoursNum = (scan.score && scan.score.recoverableHoursPerWeek) || 0;
  const tier = tierOf(score);

  // wordmark left · tier right
  try { ctx.letterSpacing = '9px'; } catch (e) {}
  ctx.fillStyle = '#EDE6DC';
  ctx.font = '800 24px "Bricolage Grotesque", "Archivo", sans-serif';
  ctx.fillText('LATENT', 72, 104);
  if (tier) {
    ctx.textAlign = 'right';
    ctx.font = '700 24px "IBM Plex Mono", monospace';
    ctx.fillText(tier, W - 72, 104);
    ctx.textAlign = 'left';
  }
  try { ctx.letterSpacing = '0px'; } catch (e) {}

  // THE number — heat gradient, data only
  const hours = hoursNum.toFixed(1);
  ctx.font = '800 200px "Bricolage Grotesque", "Archivo", sans-serif';
  const numW = ctx.measureText(hours).width;
  const grad = ctx.createLinearGradient(72, 0, 72 + Math.max(numW, 10), 0);
  grad.addColorStop(0, '#FF7A1A');
  grad.addColorStop(1, '#FF3D5E');
  ctx.fillStyle = grad;
  ctx.fillText(hours, 68, 348);

  ctx.fillStyle = '#9C8F80';
  ctx.font = '400 21px "IBM Plex Mono", monospace';
  ctx.fillText('hours/week done by hand that AI can already do', 74, 396);

  // the annual gut-punch — same math, honest unit (heat: it is data)
  const annual = workWeeksLine(hoursNum);
  if (annual) {
    const agrad = ctx.createLinearGradient(72, 0, 620, 0);
    agrad.addColorStop(0, '#FF7A1A');
    agrad.addColorStop(1, '#FF3D5E');
    ctx.fillStyle = agrad;
    ctx.font = '500 30px "IBM Plex Mono", monospace';
    ctx.fillText(annual, 72, 452);
  }

  // the roast — one receipt speaks (middle-truncated to fit)
  const roast = roastLine((scan.findings || []).filter(f => {
    const st = f.automation && f.automation.status;
    return st !== 'automated' && st !== 'dismissed';
  }));
  if (roast) {
    ctx.fillStyle = '#9C8F80';
    ctx.font = '400 19px "IBM Plex Mono", monospace';
    let line = roast;
    while (ctx.measureText(line).width > W - 144 && line.length > 8) line = line.slice(0, -2);
    if (line !== roast) line += '…';
    ctx.fillText(line, 72, 500);
  }

  // bottom row: score+receipts left · install command right
  const receipts = Math.min((scan.findings || []).length, MAX_RECEIPTS);
  ctx.fillStyle = '#EDE6DC';
  ctx.font = '500 24px "IBM Plex Mono", monospace';
  const scoreStr = 'LEVERAGE ' + (score != null ? score : '—') + '/100';
  ctx.fillText(scoreStr, 72, 556);
  const scoreW = ctx.measureText(scoreStr).width;
  ctx.fillStyle = '#9C8F80';
  ctx.fillText(receipts + ' receipt' + (receipts === 1 ? '' : 's'), 72 + scoreW + 40, 556);
  ctx.textAlign = 'right';
  ctx.fillStyle = '#EDE6DC';
  ctx.fillText(INSTALL_CMD, W - 72, 556);
  ctx.textAlign = 'left';

  // provenance — the trust line
  ctx.fillStyle = '#9C8F80';
  ctx.font = '400 15px "IBM Plex Mono", monospace';
  ctx.fillText('read locally — nothing left the machine', 72, 584);
}

/* ---------- small components ---------- */

/* Scanning counter: interpolates between polls so the instrument ticks. */
function TickNumber({ value }) {
  const [disp, setDisp] = useState(value);
  const fromRef = useRef(value);
  useEffect(() => {
    if (REDUCED_MOTION) { fromRef.current = value; setDisp(value); return; }
    const from = fromRef.current, to = value;
    if (from === to) return;
    let raf;
    const t0 = performance.now(), dur = 360;
    const step = t => {
      const k = Math.min(1, (t - t0) / dur);
      const v = Math.round(from + (to - from) * k);
      fromRef.current = v; setDisp(v);
      if (k < 1) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [value]);
  return <React.Fragment>{disp.toLocaleString()}</React.Fragment>;
}

/* The signature: hours counting up, ease-out. Reduced motion → final value, instantly. */
function CountUp({ to, dur, play }) {
  // Start at 0 (not `to`) so the frame where `play` flips never flashes the final value.
  const [v, setV] = useState(REDUCED_MOTION ? to : 0);
  useEffect(() => {
    if (!play) return;
    if (REDUCED_MOTION) { setV(to); return; }
    let raf;
    const t0 = performance.now();
    const step = t => {
      const k = Math.min(1, (t - t0) / dur);
      setV(to * (1 - Math.pow(1 - k, 3)));
      if (k < 1) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [play, to, dur]);
  return <React.Fragment>{v.toFixed(1)}</React.Fragment>;
}

/* Topbar numbers ease to new values when a status change moves the score
   (~600ms). Reduced motion: instant swap. */
function TweenNumber({ value, decimals }) {
  const [disp, setDisp] = useState(value);
  const fromRef = useRef(value);
  useEffect(() => {
    // Hidden tab: rAF never fires — swap instantly rather than wedge mid-tween.
    if (REDUCED_MOTION || document.hidden) { fromRef.current = value; setDisp(value); return; }
    const from = fromRef.current, to = value;
    if (from === to) return;
    let raf, done = false;
    const t0 = performance.now(), dur = 600;
    const step = t => {
      const k = Math.min(1, (t - t0) / dur);
      const v = from + (to - from) * (1 - Math.pow(1 - k, 3));
      fromRef.current = v; setDisp(v);
      if (k < 1) raf = requestAnimationFrame(step);
      else done = true;
    };
    raf = requestAnimationFrame(step);
    // If the tab hides mid-tween the rAF loop stalls; snap to the real number.
    const guard = setTimeout(() => { if (!done) { fromRef.current = value; setDisp(value); } }, dur + 400);
    return () => { cancelAnimationFrame(raf); clearTimeout(guard); };
  }, [value]);
  return <React.Fragment>{disp.toFixed(decimals)}</React.Fragment>;
}

/* Score + hours in the topbar. When the score RISES the score stat pulses once
   (scale 1.06 → 1, 180ms) — the loop's payoff moment. */
function TopStats({ value, hours }) {
  const [pulse, setPulse] = useState(false);
  const prevRef = useRef(value);
  useEffect(() => {
    const prev = prevRef.current;
    prevRef.current = value;
    if (REDUCED_MOTION || value == null || prev == null || !(value > prev)) return;
    setPulse(true);
    const t = setTimeout(() => setPulse(false), 240);
    return () => clearTimeout(t);
  }, [value]);
  return (
    <React.Fragment>
      <span className={'topbar-stat stat-pulse' + (pulse ? ' on' : '')}>
        LEVERAGE {value != null ? <TweenNumber value={value} decimals={0} /> : '—'}
        <span className="dim">/100</span>
        {tierOf(value) ? <span className="tier"> · {tierOf(value)}</span> : null}
      </span>
      <span className="topbar-stat">
        <span className="heat-text">≈<TweenNumber value={hours} decimals={1} /> h/wk</span>{' '}
        <span className="dim">by hand, est.</span>
      </span>
    </React.Fragment>
  );
}

/* Dialog stack + body scroll lock. Escape closes only the topmost dialog, and the
   lock is reference-counted so stacked dialogs never leave the page unscrollable. */
const MODAL_STACK = [];
let bodyLockCount = 0;
let bodyPrevOverflow = '';
function lockBody() {
  if (bodyLockCount === 0) {
    bodyPrevOverflow = document.body.style.overflow;
    document.body.style.overflow = 'hidden';
  }
  bodyLockCount++;
}
function unlockBody() {
  bodyLockCount = Math.max(0, bodyLockCount - 1);
  if (bodyLockCount === 0) document.body.style.overflow = bodyPrevOverflow;
}

const FOCUSABLE = 'a[href], button:not([disabled]), input:not([disabled]), ' +
  'select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])';

function Modal({ title, onClose, children, footer }) {
  const closeRef = useRef(null);
  const panelRef = useRef(null);
  const pressedOnOverlay = useRef(false);
  // Track the latest onClose in a ref so the mount effect never re-runs
  // (callers pass inline arrows whose identity changes every render).
  const onCloseRef = useRef(onClose);
  useEffect(() => { onCloseRef.current = onClose; }, [onClose]);
  useEffect(() => {
    const opener = document.activeElement;
    const entry = {};
    MODAL_STACK.push(entry);
    lockBody();
    if (closeRef.current) closeRef.current.focus();
    const onKey = e => {
      if (MODAL_STACK[MODAL_STACK.length - 1] !== entry) return; // only the topmost dialog reacts
      if (e.key === 'Escape') { onCloseRef.current(); return; }
      if (e.key === 'Tab' && panelRef.current) {
        // Trap Tab inside the dialog; pull focus back in if it ever escapes.
        const items = panelRef.current.querySelectorAll(FOCUSABLE);
        if (!items.length) { e.preventDefault(); return; }
        const first = items[0], last = items[items.length - 1];
        const inside = panelRef.current.contains(document.activeElement);
        if (e.shiftKey) {
          if (!inside || document.activeElement === first) { e.preventDefault(); last.focus(); }
        } else if (!inside || document.activeElement === last) {
          e.preventDefault(); first.focus();
        }
      }
    };
    document.addEventListener('keydown', onKey);
    return () => {
      document.removeEventListener('keydown', onKey);
      unlockBody();
      const i = MODAL_STACK.indexOf(entry);
      if (i !== -1) MODAL_STACK.splice(i, 1);
      if (opener && typeof opener.focus === 'function' && document.contains(opener)) opener.focus();
    };
  }, []);
  return (
    <div
      className="overlay"
      onMouseDown={e => { pressedOnOverlay.current = e.target === e.currentTarget; }}
      onMouseUp={e => {
        // Close only when the press started AND ended on the backdrop — a
        // text-selection drag released on the overlay must not dismiss the dialog.
        if (pressedOnOverlay.current && e.target === e.currentTarget) onCloseRef.current();
        pressedOnOverlay.current = false;
      }}
    >
      <div ref={panelRef} className="modal" role="dialog" aria-modal="true" aria-label={title}>
        <div className="modal-head">
          <div className="modal-title">{title}</div>
          <button ref={closeRef} className="modal-close" aria-label="Close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">{children}</div>
        {footer ? <div className="modal-foot">{footer}</div> : null}
      </div>
    </div>
  );
}

/* ---------- consent panel — the gate every scan passes through ---------- */
function ConsentModal({ storedRoots, storedShell, onClose, onStart }) {
  // Captured once: the parent recomputes storedRoots each render, and a fresh
  // identity must not re-run the fetch effect and wipe the user's edits.
  const storedRef = useRef(storedRoots || null);
  const [rows, setRows] = useState(null); // null = loading; [{path, display, checked}]
  const [loadErr, setLoadErr] = useState('');
  const [custom, setCustom] = useState('');
  const [agreed, setAgreed] = useState(false); // UNCHECKED by default — the point of the panel
  // Shell history: opt-in, UNCHECKED by default; mirrors a previously stored choice.
  const [shell, setShell] = useState(storedShell === true);

  useEffect(() => {
    let dead = false;
    (async () => {
      let server = [];
      try {
        const r = await fetchJSON('/api/roots');
        if (r.ok && r.body && Array.isArray(r.body.roots)) server = r.body.roots;
        else if (!dead) setLoadErr('Could not load the default folders — add one below.');
      } catch (e) {
        if (!dead) setLoadErr('Could not load the default folders — add one below.');
      }
      if (dead) return;
      const stored = storedRef.current;
      // Server roots first (pre-checked to stored scope when one exists, else all on),
      // then any stored custom folders the server doesn't know about.
      const next = server
        .filter(r => r && typeof r.path === 'string')
        .map(r => ({
          path: r.path,
          display: r.display || homeToTilde(r.path),
          checked: stored ? stored.indexOf(r.path) !== -1 : true,
        }));
      (stored || []).forEach(p => {
        if (!next.some(r => r.path === p)) {
          next.push({ path: p, display: homeToTilde(p), checked: true });
        }
      });
      setRows(next);
    })();
    return () => { dead = true; };
  }, []);

  const addCustom = () => {
    const p = custom.trim();
    if (!p) return; // no validation beyond non-empty (SPEC)
    setRows(rs => {
      const list = rs ? rs.slice() : [];
      if (!list.some(r => r.path === p)) { // de-dupe
        list.push({ path: p, display: homeToTilde(p), checked: true });
      }
      return list;
    });
    setCustom('');
  };

  const chosen = (rows || []).filter(r => r.checked).map(r => r.path);
  const ready = chosen.length > 0 && agreed;

  return (
    <Modal
      title="Before Latent reads anything"
      onClose={onClose}
      footer={
        <React.Fragment>
          <button
            className="btn btn-primary"
            aria-disabled={!ready}
            onClick={() => { if (ready) onStart(chosen, shell); }}
          >Start the read</button>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
        </React.Fragment>
      }
    >
      <div className="consent-h">Folders Latent may read</div>
      {rows === null ? (
        <div className="consent-note">Finding your folders…</div>
      ) : (
        <React.Fragment>
          {loadErr ? <div className="consent-note">{loadErr}</div> : null}
          {rows.map((r, i) => (
            <label className="consent-row" key={r.path}>
              <input
                type="checkbox"
                checked={r.checked}
                onChange={() => setRows(rs =>
                  rs.map((x, j) => (j === i ? { ...x, checked: !x.checked } : x)))}
              />
              <span className="consent-path">{r.display}</span>
            </label>
          ))}
          <div className="consent-add">
            <input
              className="consent-input"
              type="text"
              placeholder="/path/to/another/folder"
              aria-label="Add another folder"
              value={custom}
              onChange={e => setCustom(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter') { e.preventDefault(); addCustom(); } }}
            />
            <button className="btn btn-ghost" onClick={addCustom}>Add</button>
          </div>
        </React.Fragment>
      )}

      <div className="consent-h">Optional</div>
      <label className="consent-row">
        <input
          type="checkbox"
          checked={shell}
          onChange={e => setShell(e.target.checked)}
        />
        <span>
          <span className="consent-path">Shell history (~/.zsh_history, ~/.bash_history)</span>
          <span className="consent-sub">
            Finds repeated command rituals. Command names only — arguments are never read into the report.
          </span>
        </span>
      </label>

      <div className="consent-h">What a read touches</div>
      <ul className="consent-disc">
        <li>file names, dates, sizes</li>
        <li>first lines of .md/.txt/.csv under 200KB · git history, read-only</li>
        {shell ? <li>command names from shell history — never their arguments</li> : null}
        <li>only the folders selected above · nothing leaves this machine</li>
        <li>macOS may ask you to allow folder access — that's the OS confirming what you chose here</li>
      </ul>

      <label className="consent-agree">
        <input type="checkbox" checked={agreed} onChange={e => setAgreed(e.target.checked)} />
        <span>I understand Latent will read the folders selected above, on this machine only.</span>
      </label>
    </Modal>
  );
}

const DOW = ['Sundays','Mondays','Tuesdays','Wednesdays','Thursdays','Fridays','Saturdays'];
function scheduleLabel(sc) {
  if (!sc || sc.type === 'manual') return 'manual — run it from Tasks';
  if (sc.type === 'interval') return 'every ' + (sc.days || 7) + ' days';
  return (DOW[sc.dow != null ? sc.dow : 1] || 'Mondays') + ' ' + String(sc.hour != null ? sc.hour : 7).padStart(2, '0') + ':00';
}
function relTime(iso) {
  if (!iso) return '—';
  const ms = new Date(iso).getTime() - Date.now();
  if (ms <= 0) return 'due now';
  const h = Math.round(ms / 3600000);
  if (h < 1) return 'in ' + Math.max(1, Math.round(ms / 60000)) + ' min';
  if (h < 48) return 'in ' + h + ' h';
  return 'in ' + Math.round(h / 24) + ' days';
}

        <div className="watch-hint">
